<div class="flex justify-content-center mt-4">
    <p-toast />
    <p-card header="Email Application Draft" class="w-full md:w-8 lg:w-6" styleClass="p-fluid">
        <div class="field mt-3">
            <label for="subject" class="font-bold">Subject</label>
            <div class="flex gap-2">
                <input id="subject" type="text" pInputText [(ngModel)]="subject" class="flex-grow-1" />
                <p-button icon="pi pi-copy" severity="secondary" (onClick)="copyToClipboard(subject)"
                    pTooltip="Copy Subject" />
            </div>
        </div>

        <div class="field mt-3">
            <label for="body" class="font-bold">Message Body</label>
            <div class="relative">
                <textarea id="body" rows="12" pInputTextarea [(ngModel)]="body" [autoResize]="false"
                    class="w-full"></textarea>
                <p-button icon="pi pi-copy" severity="secondary" (onClick)="copyToClipboard(body)"
                    styleClass="absolute top-0 right-0 m-2" pTooltip="Copy Body" />
            </div>
        </div>

        <div class="mt-4 p-3 bg-blue-50 border-round flex align-items-center gap-2 text-blue-700">
            <i class="pi pi-info-circle text-xl"></i>
            <span class="text-sm">You can now copy and paste these details into your preferred email client (e.g.,
                Gmail) to send your application manually.</span>
        </div>

        <ng-template pTemplate="footer">
            <div class="flex justify-content-between align-items-center">
                @if (result) {
                <p-button label="Back to Result" icon="pi pi-arrow-left" (onClick)="cancel()" severity="secondary"
                    [text]="true" />
                }
            </div>
        </ng-template>
    </p-card>
</div>

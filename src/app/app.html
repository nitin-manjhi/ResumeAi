<p-toast>
  <ng-template pTemplate="message" let-message>
    <div class="flex flex-column gap-3 w-full">
      <div class="flex align-items-center gap-2">
        <i [class]="message.icon || 'pi pi-info-circle'" class="text-xl"></i>
        <div class="flex flex-column gap-1">
          <span class="font-bold">{{ message.summary }}</span>
          <span class="text-sm">{{ message.detail }}</span>
        </div>
      </div>
      @if (message.data?.resultId) {
      <div class="flex justify-content-end gap-2">
        <p-button label="View Result" icon="pi pi-eye" size="small" [text]="true"
          (onClick)="notificationService.viewResult(message.data.resultId)" />
      </div>
      }
    </div>
  </ng-template>
</p-toast>

@if (isLoggedIn()) {
<div class="sticky top-0 z-5 surface-ground border-bottom-1 surface-border shadow-2 mb-4">
  <div class="max-w-7xl mx-auto">
    <p-menubar [model]="items()" styleClass="border-none bg-transparent py-2">
      <ng-template pTemplate="start">
        <div class="flex align-items-center gap-2 px-3 mr-4">
          <i class="pi pi-sparkles text-primary text-2xl"></i>
          <span class="font-bold text-xl text-900 tracking-tight">ResumeAi</span>
        </div>
      </ng-template>
      <ng-template pTemplate="end">
        <div class="flex align-items-center gap-3">
          @if (currentUser()) {
          <div class="flex align-items-center gap-2">
            <div
              class="flex align-items-center gap-2 px-3 py-2 bg-emerald-50 dark:bg-emerald-900/20 border-round-xl cursor-pointer hover:bg-emerald-100 transition-colors transition-duration-200 border-1 border-emerald-100 dark:border-emerald-800"
              (click)="goToProfile()" [pTooltip]="currentUser()?.name">
              <i class="pi pi-user text-emerald-600 dark:text-emerald-400 font-bold"></i>
              <span class="font-bold text-emerald-700 dark:text-emerald-300 hidden md:inline">{{ currentUser()?.name }}</span>
            </div>
            <p-button [icon]="isDarkMode() ? 'pi pi-sun' : 'pi pi-moon'" [text]="true" [rounded]="true"
              (onClick)="toggleTheme()" [severity]="isDarkMode() ? darkSeverity : lightSeverity" pTooltip="Toggle Mode" />
          </div>
          }
          <div class="border-left-1 surface-border h-2rem mx-2 hidden md:block"></div>
          <p-button [label]="isMobile() ? '' : 'Logout'" icon="pi pi-sign-out" [text]="true" (onClick)="logout()"
            severity="danger" styleClass="p-button-sm font-bold" pTooltip="Logout" />
        </div>
      </ng-template>
    </p-menubar>
  </div>
</div>
} @else {
<div class="sticky top-0 z-5 surface-ground border-bottom-1 surface-border shadow-2">
  <div class="max-w-7xl mx-auto flex align-items-center justify-content-between px-4 py-3">
    <div class="flex align-items-center gap-2">
      <i class="pi pi-sparkles text-primary text-2xl"></i>
      <span class="font-bold text-xl text-900 tracking-tight">ResumeAi</span>
    </div>
    <div class="flex align-items-center gap-2">
      <p-button [icon]="isDarkMode() ? 'pi pi-sun' : 'pi pi-moon'" [text]="true" [rounded]="true"
        (onClick)="toggleTheme()" [severity]="isDarkMode() ? darkSeverity : lightSeverity" pTooltip="Toggle Mode" />
      <p-button [label]="isMobile() ? '' : 'Login'" icon="pi pi-sign-in" [text]="true" (onClick)="goToLogin()"
        styleClass="p-button-sm font-bold" pTooltip="Login" />
    </div>
  </div>
</div>
}

<div class="mt-4" [style.padding]="isLoggedIn() ? (isMobile() ? '0 0.75rem' : '0 1.5rem') : '0'">
  <router-outlet></router-outlet>
</div>

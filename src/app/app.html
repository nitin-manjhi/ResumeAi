<p-toast />

@if (isLoggedIn()) {
<div class="card p-2 surface-card shadow-1 mb-3">
  <p-menubar [model]="items()">
    <ng-template pTemplate="start">
      <div class="flex align-items-center gap-2 px-3">
        <i class="pi pi-sparkles text-primary text-2xl"></i>
        <span class="font-bold text-xl text-900">ResumeAi</span>
      </div>
    </ng-template>
    <ng-template pTemplate="end">
      <div class="flex align-items-center gap-3">
        @if (currentUser()) {
        <div
          class="flex align-items-center gap-2 px-3 py-2 bg-primary-50 border-round-xl cursor-pointer hover:bg-primary-100 transition-colors transition-duration-200"
          (click)="goToProfile()">
          <i class="pi pi-user text-primary font-bold"></i>
          <span class="font-bold text-primary">{{ currentUser()?.name }}</span>
        </div>
        }
        <p-button label="Logout" icon="pi pi-sign-out" [text]="true" (onClick)="logout()" severity="danger"
          styleClass="p-button-sm font-bold" />
      </div>
    </ng-template>
  </p-menubar>
</div>
}

<div [style.padding]="isLoggedIn() ? '0 1rem' : '0'">
  <router-outlet></router-outlet>
</div>

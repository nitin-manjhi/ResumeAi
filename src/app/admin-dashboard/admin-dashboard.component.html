<div class="p-3 flex flex-column gap-3 admin-container overflow-hidden surface-ground">
    <p-toast />

    <div class="flex flex-column lg:flex-row gap-3 flex-1 overflow-hidden">
        <!-- Left Section: Pending Upgrade Requests -->
        <div class="flex-1 flex flex-column overflow-hidden">
            <p-card header="Pending Upgrade Requests"
                styleClass="shadow-3 border-round-xl h-full flex flex-column overflow-hidden"
                [style]="{'display': 'flex', 'flex-direction': 'column'}">
                <div class="flex-1 overflow-auto mt-2">
                    <p-table [value]="upgradeRequests()" [loading]="loadingRequests()" [paginator]="true" [rows]="10"
                        responsiveLayout="scroll" styleClass="p-datatable-sm p-datatable-striped flex-1"
                        [scrollHeight]="'flex'">
                        <ng-template pTemplate="header">
                            <tr>
                                <th>Date</th>
                                <th>User</th>
                                <th>Reason</th>
                                <th style="width: 15rem">Actions</th>
                            </tr>
                        </ng-template>
                        <ng-template pTemplate="body" let-request>
                            <tr>
                                <td>{{request.createdAt | date:'shortDate'}}</td>
                                <td class="font-bold">{{request.username}}</td>
                                <td class="text-sm line-height-3">{{request.reason}}</td>
                                <td>
                                    <div class="flex gap-2">
                                        <p-button icon="pi pi-check" label="Approve"
                                            (onClick)="processRequest(request.id, 'APPROVED')" severity="success"
                                            size="small" styleClass="p-button-raised p-button-sm" />
                                        <p-button icon="pi pi-times" label="Reject"
                                            (onClick)="processRequest(request.id, 'REJECTED')" severity="danger"
                                            size="small" styleClass="p-button-outlined p-button-sm" />
                                    </div>
                                </td>
                            </tr>
                        </ng-template>
                        <ng-template pTemplate="emptymessage">
                            <tr>
                                <td colspan="4" class="text-center p-4 text-secondary">No pending requests.</td>
                            </tr>
                        </ng-template>
                    </p-table>
                </div>
            </p-card>
        </div>

        <!-- Right Section: User Usage Management -->
        <div class="flex-1 flex flex-column overflow-hidden">
            <p-card header="User Management"
                styleClass="shadow-3 border-round-xl h-full flex flex-column overflow-hidden"
                [style]="{'display': 'flex', 'flex-direction': 'column'}">
                <div class="flex-1 overflow-auto mt-2">
                    <p-table [value]="users()" [loading]="loadingUsers()" [paginator]="true" [rows]="10"
                        responsiveLayout="scroll" styleClass="p-datatable-sm p-datatable-gridlines flex-1"
                        [scrollHeight]="'flex'">
                        <ng-template pTemplate="header">
                            <tr>
                                <th>User</th>
                                <th>Usage (A/G/L)</th>
                                <th>Action</th>
                            </tr>
                        </ng-template>
                        <ng-template pTemplate="body" let-user>
                            <tr>
                                <td>
                                    <div class="flex flex-column">
                                        <span class="font-bold">{{user.username}}</span>
                                        <span class="text-xs text-secondary">{{user.email}}</span>
                                        <span
                                            [class]="'customer-badge mt-1 status-' + (user.role === 'ADMIN' ? 'qualified' : 'new')"
                                            style="width: fit-content">
                                            {{user.role}}
                                        </span>
                                    </div>
                                </td>
                                <td>
                                    <div class="flex flex-column gap-2">
                                        <div class="flex align-items-center gap-2">
                                            <span class="text-xs font-semibold w-3rem">Analysis:</span>
                                            <p-inputNumber [(ngModel)]="user.analysisCount" [showButtons]="true"
                                                [min]="0" inputStyleClass="w-full text-sm p-1" styleClass="w-full" />
                                        </div>
                                        <div class="flex align-items-center gap-2">
                                            <span class="text-xs font-semibold w-3rem">Gen:</span>
                                            <p-inputNumber [(ngModel)]="user.generationCount" [showButtons]="true"
                                                [min]="0" inputStyleClass="w-full text-sm p-1" styleClass="w-full" />
                                        </div>
                                        <div
                                            class="flex align-items-center gap-2 border-top-1 surface-border pt-2 mt-1">
                                            <span class="text-xs font-bold text-primary w-3rem">Limit:</span>
                                            <p-inputNumber [(ngModel)]="user.usageLimit" [showButtons]="true" [min]="0"
                                                inputStyleClass="w-full text-sm p-1 font-bold" styleClass="w-full" />
                                        </div>
                                    </div>
                                </td>
                                <td>
                                    <p-button icon="pi pi-save" (onClick)="saveUsage(user)" severity="success"
                                        styleClass="p-button-rounded p-button-text" pTooltip="Save Changes" />
                                </td>
                            </tr>
                        </ng-template>
                        <ng-template pTemplate="emptymessage">
                            <tr>
                                <td colspan="3" class="text-center p-4 text-secondary">No users found.</td>
                            </tr>
                        </ng-template>
                    </p-table>
                </div>
            </p-card>
        </div>
    </div>
</div>
